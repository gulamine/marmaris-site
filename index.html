<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8">
  <title>Amine Emlak</title>
  <!-- CSS dosyanın adı stil.css -->
  <link rel="stylesheet" href="stil.css">
</head>
<body>
  <!-- Ana Sayfa Slayt Banner -->
  <div class="banner">
    <div class="slider">
      <img src="anahtar1.jpg" alt="Anahtar Görseli">
      <img src="marmaris1.jpg" alt="Marmaris Manzarası">
      <img src="marmaris2.jpg" alt="Marmaris Evleri">
      <img src="marmaris6.jpg" alt="Marmaris Evleri">
    </div>
    <div class="banner-text">
      <h1>Amine Emlak</h1>
      <p>Marmaris’in en güzel kiralık ve satılık evleri burada!</p>
    </div>
    <!-- İleri–Geri Butonları -->
    <button class="prev" onclick="prevSlide()">&#10094;</button>
    <button class="next" onclick="nextSlide()">&#10095;</button>
  </div>

  <!-- Bölge seçimi -->
  <h2>Bölge Seçin</h2>
  <div class="select-container">
    <select onchange="bolgeSec(this.value)">
      <option value="">-- Seçiniz --</option>
      <option value="Merkez">Marmaris Merkez</option>
      <option value="Armutalan">Armutalan Mahallesi</option>
      <option value="Beldibi">Beldibi Mahallesi</option>
      <option value="İçmeler">İçmeler Beldesi</option>
      <option value="Turunç">Turunç Beldesi</option>
      <option value="Selimiye">Selimiye Köyü</option>
      <option value="Bozburun">Bozburun Köyü</option>
      <option value="Hisarönü">Hisarönü Köyü</option>
      <option value="Orhaniye">Orhaniye Köyü</option>
      <option value="Turgut">Turgut Köyü</option>
      <option value="Söğüt">Söğüt Köyü</option>
      <option value="Bayır">Bayır Köyü</option>
      <option value="Çamlı">Çamlı Köyü</option>
    </select>
  </div>

  <div id="ilanlar"></div>

  <!-- İletişim Popup -->
  <div id="popup" class="popup">
    <div class="popup-content">
      <span class="close" onclick="closePopup()">&times;</span>
      <h2>İletişim Bilgileri</h2>
      <p>Telefon: 0 555 123 45 67</p>
      <p>E-posta: info@amineemlak.com</p>
      <p>Adres: Marmaris, Muğla</p>
      <!-- Form -->
      <form id="contactForm" onsubmit="sendMessage(event)">
        <input type="text" id="name" placeholder="Adınız" required>
        <input type="text" id="phone" placeholder="Telefon" required>
        <textarea id="message" placeholder="Mesajınız" required></textarea>
        <button type="submit">Gönder</button>
      </form>
    </div>
  </div>

  <script src="script.js"></script>
</body>
</html>
